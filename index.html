<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Contagem</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
    <div class="logo">
        <img src="sesi.png" alt="Sua Logo">
    </div>
</header>
<main>
    <div class="retangulo-central">
        <div id="painel-contagem" class="painel-contagem">Total de pessoas: 32</div>
        <button onclick="adicionarPessoa()">Adicionar Pessoa</button>
        <button onclick="removerPessoa()">Remover Pessoa</button>
    </div>
</main>
<footer>
    <div class="barra-preta"></div>
</footer>
<div class="faixa-preta-final"></div> <!-- Faixa preta no final da página -->

<script src="contagem.js"></script>
</body>
</html>
